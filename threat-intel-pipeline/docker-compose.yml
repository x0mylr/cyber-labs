version: "3.9"

# Threat Intelligence Pipeline — Docker Compose Stack
#
# Usage:
#   cp .env.example .env && nano .env    # Set API keys
#   docker compose up -d                 # Start the pipeline
#   docker compose logs -f               # Watch logs
#   docker compose exec pipeline python main.py stats
#
# The pipeline runs on ARM64 (Raspberry Pi 4) and AMD64.

services:

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: threat-intel-pipeline:latest
    container_name: tipl-pipeline
    restart: unless-stopped

    # Load API keys from .env file
    env_file:
      - .env

    environment:
      # Override specific settings without touching .env
      - TIPL_DB_PATH=/app/data/threat_intel.db
      - TIPL_LOG_LEVEL=${TIPL_LOG_LEVEL:-INFO}

    ports:
      - "${TIPL_API_PORT:-8000}:8000"

    volumes:
      # Persist the SQLite database across container restarts
      - tipl-data:/app/data
      # Persist logs
      - tipl-logs:/app/logs
      # Mount config so you can edit without rebuilding
      - ./config:/app/config:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Resource limits — conservative defaults for Raspberry Pi 4 (4GB)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # Optional: Nginx reverse proxy with SSL termination
  # Uncomment if you want HTTPS access from outside your network
  # nginx:
  #   image: nginx:alpine
  #   container_name: tipl-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./certs:/etc/ssl/certs:ro
  #   depends_on:
  #     - pipeline

volumes:
  tipl-data:
    driver: local
  tipl-logs:
    driver: local
